app = "panini-trade-api"
primary_region = "ams"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3001"

[[mounts]]
  source = "panini_data"
  destination = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
